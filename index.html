<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sleek Animated Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
  <!-- Interactive Background Blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="calculator-wrapper">
    <!-- Calculator Card -->
    <div class="calculator-card">
      <!-- Header / Options -->
      <div class="calc-header">
        <button id="btn-history" class="icon-btn" title="View History">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </button>
        <div class="calc-title">Calculator</div>
        <button id="btn-theme" class="icon-btn" title="Toggle Theme">
          <!-- Sun Icon -->
          <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <!-- Moon Icon -->
          <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
      <!-- Display Screens -->
      <div class="calc-display">
        <div id="display-formula" class="formula-screen"></div>
        <div id="display-main" class="main-screen">0</div>
      </div>
      <!-- Keypad -->
      <div class="calc-keypad">
        <!-- Row 1 -->
        <button class="key btn-action" data-action="clear">AC</button>
        <button class="key btn-action" data-action="backspace">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>
        </button>
        <button class="key btn-action" data-action="percent">%</button>
        <button class="key btn-operator" data-operator="/">&divide;</button>
        <!-- Row 2 -->
        <button class="key btn-num" data-val="7">7</button>
        <button class="key btn-num" data-val="8">8</button>
        <button class="key btn-num" data-val="9">9</button>
        <button class="key btn-operator" data-operator="*">&times;</button>
        <!-- Row 3 -->
        <button class="key btn-num" data-val="4">4</button>
        <button class="key btn-num" data-val="5">5</button>
        <button class="key btn-num" data-val="6">6</button>
        <button class="key btn-operator" data-operator="-">&minus;</button>
        <!-- Row 4 -->
        <button class="key btn-num" data-val="1">1</button>
        <button class="key btn-num" data-val="2">2</button>
        <button class="key btn-num" data-val="3">3</button>
        <button class="key btn-operator" data-operator="+">+</button>
        <!-- Row 5 -->
        <button class="key btn-action" data-action="toggle-sign">&plus;/&minus;</button>
        <button class="key btn-num" data-val="0">0</button>
        <button class="key btn-num" data-val=".">.</button>
        <button class="key btn-equal" data-action="calculate">=</button>
      </div>
    </div>
    <!-- History Panel (Slides out from inside/behind the calculator) -->
    <div id="history-panel" class="history-panel">
      <div class="history-header">
        <h3>History</h3>
        <button id="btn-close-history" class="icon-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div id="history-list" class="history-list">
        <div class="empty-history">No history yet</div>
      </div>
      <div class="history-footer">
        <button id="btn-clear-history" class="clear-history-btn">Clear All</button>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
